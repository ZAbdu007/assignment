<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Student Assignment Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="container">
    <h1>Student Assignment Tracker</h1>
    <p class="subtitle">Track assignments, deadlines, and progress.</p>

    <form id="assignment-form">
      <input type="text" id="title" placeholder="Assignment title" required />
      <input type="text" id="module" placeholder="Module name" required />
      <input type="date" id="due-date" required />
      <input type="email" id="email" placeholder="Student email" required />
      <button type="submit">Add Assignment</button>
    </form>

    <div class="search-box">
      <input type="text" id="search-input" placeholder="Search by title or module" />
    </div>

    <div class="sort-box">
      <select id="sort-select">
        <option value="default">Sort by</option>
        <option value="due-asc">Due date: earliest first</option>
        <option value="due-desc">Due date: latest first</option>
      </select>
    </div>

    <div class="filters">
      <button type="button" onclick="setFilter('all')">All</button>
      <button type="button" onclick="setFilter('pending')">Pending</button>
      <button type="button" onclick="setFilter('completed')">Completed</button>
    </div>

    <div class="stats">
      <p><strong>Total:</strong> <span id="total-count">0</span></p>
      <p><strong>Completed:</strong> <span id="completed-count">0</span></p>
      <p><strong>Pending:</strong> <span id="pending-count">0</span></p>
    </div>

    <button type="button" id="clear-all-btn">Clear All Assignments</button>

    <ul id="assignment-list"></ul>
  </div>

  <script src="app.js"></script>
</body>
</html>
